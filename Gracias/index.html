<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gracias</title>
    <link rel="shortcut icon" href="../assets/images/favGHP.png" type="image/x-icon">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #1f5fbf; /* azul tipo hero */
        }

        .success-wrapper {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .success-card {
            position: relative;
            width: 100%;
            max-width: 420px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            padding: 36px 32px 30px;
            overflow: hidden;
        }

        /* línea decorativa superior */
        .success-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: #1f5fbf;
        }

        .success-close {
            position: absolute;
            top: 14px;
            right: 14px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: none;
            background: #eef2f7;
            color: #5b6777;
            font-size: 14px;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .success-close:hover {
            background: #1f5fbf;
            color: #fff;
        }

        .success-card h2 {
            margin: 10px 0 16px;
            font-size: 32px;
            font-weight: 700;
            color: #0f2747;
        }

        .success-card p {
            margin: 0 0 26px;
            font-size: 15.5px;
            line-height: 1.6;
            color: #475569;
        }

        .success-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 52px;
            border-radius: 8px;
            background: #0f2747;
            color: #ffffff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            transition: all 0.25s ease;
        }

        .success-btn:hover {
            background: #1f5fbf;
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(31, 95, 191, 0.3);
        }

        @media (max-width: 480px) {
            .success-card {
                padding: 28px 22px;
            }

            .success-card h2 {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>

    <div class="success-wrapper">
        <div class="success-card">

            <a href="../index.html" class="success-close">×</a>

            <h2>¡Gracias!</h2>

            <p>
                Hemos recibido su solicitud correctamente. Nuestro equipo dará seguimiento a su mensaje a la brevedad posible.
            </p>

            <a href="../index.html" class="success-btn">Ir al inicio</a>

        </div>
    </div>

</body>
</html>
